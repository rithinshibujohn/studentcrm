{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <h1 class="h3 mb-4 text-gray-800">
        Change Password
    </h1>

    <div class="card shadow">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary">
                    Change Password
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
