{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h2>Students</h2>

    <a href="{% url 'student_add' %}" class="btn btn-success">
        Add Student
    </a>
</div>

<table class="table table-bordered">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Course</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

<td>{{ student.email }}</td>

<td>{{ student.course }}</td>

<td>

<a class="btn btn-info btn-sm"
href="{% url 'student_detail' student.id %}">
View
</a>

<a class="btn btn-warning btn-sm"
href="{% url 'student_edit' student.id %}">
Edit
</a>

<a class="btn btn-danger btn-sm"
href="{% url 'student_delete' student.id %}">
Delete
</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="4">

No students found.

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
