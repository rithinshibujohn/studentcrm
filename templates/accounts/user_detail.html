{% extends "base.html" %}

{% block title %}User Details{% endblock %}

{% block content %}

<h1 class="h3 mb-4 text-gray-800">

User Details

</h1>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered">

<tr>

<th width="200">

First Name

</th>

<td>

{{ user_obj.first_name }}

</td>

</tr>

<tr>

<th>

Last Name

</th>

<td>

{{ user_obj.last_name }}

</td>

</tr>

<tr>

<th>

Username

</th>

<td>

{{ user_obj.username }}

</td>

</tr>

<tr>

<th>

Email

</th>

<td>

{{ user_obj.email }}

</td>

</tr>

</table>

<a href="{% url 'user_list' %}"

class="btn btn-secondary">

Back

</a>

</div>

</div>

{% endblock %}
